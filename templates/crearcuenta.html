{% extends "base.html" %}

{% block title %}Registro PyMongo EJMA{% endblock %}

{% block content %}
<div class="mt-5">
    <div >
        <h1 class="display-4 text-white">Nuevo Registro</h1>
        <p class="h5 text-secondary fw-light">Gestor de tareas cotidianas</p>
    </div>

    <form action="/registro" method="POST" class="row g-4">
        <div class="col-md-6">
            <label class="h6 text-secondary text-uppercase">Nombre de usuario</label>
            <input type="text" class="form-control bg-transparent border-secondary text-white p-2" name="user" placeholder="Ej: monito_user">
        </div>

        <div class="col-md-6">
            <label class="h6 text-secondary text-uppercase"> Gmail</label>
            <input type="email" class="form-control bg-transparent border-secondary text-white p-2" name="gmail" placeholder="juanita@gmail.com">
        </div>

        <div class="col-12">
            <label class="h6 text-secondary text-uppercase">Contraseña</label>
            <input type="password" class="form-control bg-transparent border-secondary text-white p-2" name="contra">
        </div>

        <div class="col-12">
            <label class="h6 text-secondary text-uppercase">Razón de uso</label>
            <textarea class="form-control bg-transparent border-secondary text-white" name="razon" rows="2"></textarea>
            <div class="form-text opacity-50">Explica las razones por las que llegaste aqui .</div>
        </div>

        <div class="col-12 mt-5">
            <button type="submit" class="btn btn-outline-secondary h5 px-5 py-2 text-white border-secondary">
                GUARDAR DATOS
            </button>
        </div>
    </form>
</div>
{% endblock %}
